services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quizforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quizforge}
      POSTGRES_DB: quizforge
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizforge"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data

  api:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://quizforge:${POSTGRES_PASSWORD:-quizforge}@db:5432/quizforge
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /data/uploads
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    build: ./backend
    command: python worker.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://quizforge:${POSTGRES_PASSWORD:-quizforge}@db:5432/quizforge
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  caddy:
    build: ./frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploads:
  caddydata:
  caddyconfig:
